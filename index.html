<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoryRun 2026</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
}
.main { font-size: 60px; }
.small { font-size: 12px; color: #777; margin-top: 30px; }
</style>
</head>

<body>

<h1>🏃 BoryRun 2026</h1>
<div id="countdown">⏳</div>

<div class="main" id="total">--</div>
<div>zapisanych</div>

<div>
💰 <span id="paid">--</span> |
🕒 <span id="unpaid">--</span> |
👶 <span id="kids">--</span>
</div>

<div class="small">
Inne biegi: <span id="bol">--</span>
</div>

<button onclick="load()">Odśwież</button>

<script>
const EVENT = "https://www.zmierzymyczas.pl/2404/boryrun-2026.html";
const MAIN = "https://www.zmierzymyczas.pl/";
const KIDS = "https://www.boryrun.pl/rejestracja";

const PROXY = url => "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);

// COUNTDOWN
function countdown() {
    const end = new Date("2026-05-24T09:00:00");
    const diff = end - new Date();

    if (diff <= 0) return document.getElementById("countdown").innerText = "START";

    const d = Math.floor(diff / 86400000);
    const h = Math.floor(diff / 3600000 % 24);
    const m = Math.floor(diff / 60000 % 60);

    document.getElementById("countdown").innerText =
        `${d} dni ${h}h ${m}m`;
}

// FETCH
async function get(url) {
    const res = await fetch(PROXY(url));
    return await res.text();
}

// LOAD
async function load() {
    try {
        // 1. opłaceni
        const html1 = await get(EVENT);
        const doc1 = new DOMParser().parseFromString(html1, "text/html");
        const paidEl = doc1.querySelector(".zapisy_impreza_info_value");
        const paid = paidEl ? parseInt(paidEl.textContent) : 0;

        // 2. wszyscy
        const html2 = await get(MAIN);
        const doc2 = new DOMParser().parseFromString(html2, "text/html");
        let total = 0;
        doc2.querySelectorAll("a").forEach(a => {
            if (a.getAttribute("href") === "/2404/boryrun-2026.html") {
                total = parseInt(a.textContent);
            }
        });

        // 3. dzieci
        const html3 = await get(KIDS);
        const doc3 = new DOMParser().parseFromString(html3, "text/html");
        const kidsEl = doc3.querySelector(".RegistrationForm-module__yvop-q__spotsCount");
        const kids = kidsEl ? parseInt(kidsEl.textContent) : 0;

        // 4. konkurencja (1 strona tylko – szybciej)
        const html4 = await get("https://b4sportonline.pl/boleslawiec_run/lista_uczestnikow_polmaraton_1/11893");
        const doc4 = new DOMParser().parseFromString(html4, "text/html");
        const bol = Math.max(0, doc4.querySelectorAll("table tr").length - 1);

        const unpaid = total - paid;

        document.getElementById("total").innerText = total;
        document.getElementById("paid").innerText = paid;
        document.getElementById("unpaid").innerText = unpaid;
        document.getElementById("kids").innerText = kids;
        document.getElementById("bol").innerText = bol;

    } catch (e) {
        document.getElementById("total").innerText = "błąd";
        console.error(e);
    }
}

// START
load();
countdown();

setInterval(load, 60000);
setInterval(countdown, 60000);
</script>

</body>
</html>
