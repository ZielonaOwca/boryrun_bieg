<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoryRun 2026 - Monitor</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
}
h1 { margin-bottom: 10px; }
.countdown { font-size: 18px; margin-bottom: 20px; color: #94a3b8; }
.main-number { font-size: 64px; font-weight: bold; }
.progress-box { margin-top: 20px; }
.progress { height: 20px; background: #1e293b; border-radius: 10px; overflow: hidden; }
.progress-bar { height: 100%; background: #22c55e; width: 0%; transition: 0.5s; }
button {
    margin-top: 20px;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    font-size: 16px;
}
</style>
</head>

<body>

<h1>🏃 BoryRun 2026</h1>

<div class="countdown" id="countdown">⏳ ładowanie...</div>

<div class="main-number" id="total">--</div>
<div>zapisanych uczestników</div>

<div class="progress-box">
    <div id="percent">--%</div>
    <div class="progress">
        <div class="progress-bar" id="bar"></div>
    </div>
</div>

<button onclick="loadData()">🔄 Odśwież</button>

<script>
const URL = "https://www.zmierzymyczas.pl/2404/boryrun-2026.html";
const EVENT_DATE = new Date("2026-05-24T09:00:00");
const LIMIT = 500;

const PROXY = url => "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);

async function fetchHTML(url) {
    const res = await fetch(PROXY(url));
    return await res.text();
}

function updateCountdown() {
    const now = new Date();
    const diff = EVENT_DATE - now;

    if (diff <= 0) {
        document.getElementById("countdown").innerText = "START!";
        return;
    }

    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const m = Math.floor((diff / (1000 * 60)) % 60);

    document.getElementById("countdown").innerText =
        `⏳ ${d} dni ${h} godz ${m} min`;
}

function getSummary(doc) {
    const el = doc.querySelector(".zapisy_impreza_info_value");
    return el ? parseInt(el.textContent.trim()) : null;
}

async function getParticipantsCount() {
    let total = 0;
    let start = 0;

    while (true) {
        const html = await fetchHTML(URL + "?start=" + start);
        const doc = new DOMParser().parseFromString(html, "text/html");

        let count = 0;

        doc.querySelectorAll("table").forEach(table => {
            if (table.innerHTML.includes("Nazwisko")) {
                const rows = table.querySelectorAll("tr");
                count += rows.length - 1;
            }
        });

        total += count;

        if (count < 100) break;
        start += 100;
    }

    return total;
}

async function loadData() {
    try {
        const html = await fetchHTML(URL);
        const doc = new DOMParser().parseFromString(html, "text/html");

        const summary = getSummary(doc);
        const participants = await getParticipantsCount();

        const total = summary || participants;
        const percent = Math.round((total / LIMIT) * 100);

        document.getElementById("total").innerText = total;
        document.getElementById("percent").innerText = percent + "%";
        document.getElementById("bar").style.width = percent + "%";

    } catch (e) {
        console.error("Błąd:", e);
    }
}

loadData();
updateCountdown();

setInterval(loadData, 300000);
setInterval(updateCountdown, 60000);
</script>

</body>
</html>
