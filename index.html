<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoryRun 2026 - Dashboard</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    text-align: center;
    padding: 20px;
}
h1 { margin-bottom: 5px; }
.countdown { color: #94a3b8; margin-bottom: 20px; }

.main-number {
    font-size: 60px;
    font-weight: bold;
}

.section {
    margin-top: 15px;
}

.small {
    font-size: 12px;
    color: #666;
    margin-top: 30px;
}
</style>
</head>

<body>

<h1>🏃 BoryRun 2026</h1>
<div class="countdown" id="countdown">⏳ ładowanie...</div>

<div class="main-number" id="total">--</div>
<div>zapisanych uczestników</div>

<div class="section">
    💰 Opłaceni: <span id="paid">--</span><br>
    🕒 Nieopłaceni: <span id="unpaid">--</span><br>
    👶 Dzieci: <span id="kids">--</span>
</div>

<div class="section">
    <h3>📊 Kategorie</h3>
    <div id="categories">--</div>
</div>

<div class="small">
    Inne biegi w regionie: <span id="bol">--</span> uczestników
</div>

<button onclick="loadData()">🔄 Odśwież</button>

<script>
const EVENT_URL = "https://www.zmierzymyczas.pl/2404/boryrun-2026.html";
const MAIN_URL = "https://www.zmierzymyczas.pl/";
const KIDS_URL = "https://www.boryrun.pl/rejestracja";
const EVENT_DATE = new Date("2026-05-24T09:00:00");

const PROXIES = [
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`
];

async function fetchHTML(url, i = 0) {
    if (i >= PROXIES.length) throw new Error("Proxy error");
    try {
        const res = await fetch(PROXIES[i](url));
        if (!res.ok) throw new Error();
        return await res.text();
    } catch {
        return fetchHTML(url, i + 1);
    }
}

function updateCountdown() {
    const now = new Date();
    const diff = EVENT_DATE - now;

    if (diff <= 0) {
        document.getElementById("countdown").innerText = "START!";
        return;
    }

    const d = Math.floor(diff / (1000*60*60*24));
    const h = Math.floor((diff / (1000*60*60)) % 24);
    const m = Math.floor((diff / (1000*60)) % 60);

    document.getElementById("countdown").innerText =
        `⏳ ${d} dni ${h}h ${m}m`;
}

function getPaid(doc) {
    const el = doc.querySelector(".zapisy_impreza_info_value");
    return el ? parseInt(el.textContent.trim()) : 0;
}

function getTotal(doc) {
    const links = doc.querySelectorAll("a");
    for (let a of links) {
        if (a.getAttribute("href") === "/2404/boryrun-2026.html") {
            return parseInt(a.textContent.trim());
        }
    }
    return 0;
}

function getKids(doc) {
    const el = doc.querySelector(".RegistrationForm-module__yvop-q__spotsCount");
    return el ? parseInt(el.textContent.trim()) : 0;
}

async function getCategories() {
    let categories = {};
    let start = 0;

    while (true) {
        const html = await fetchHTML(EVENT_URL + "?start=" + start);
        const doc = new DOMParser().parseFromString(html, "text/html");

        let count = 0;

        doc.querySelectorAll("table").forEach(table => {
            if (table.innerHTML.includes("Nazwisko")) {
                const rows = table.querySelectorAll("tr");

                for (let i = 1; i < rows.length; i++) {
                    const cells = rows[i].querySelectorAll("td");
                    if (cells.length >= 7) {
                        const cat = cells[6].textContent.trim();
                        categories[cat] = (categories[cat] || 0) + 1;
                        count++;
                    }
                }
            }
        });

        if (count < 100) break;
        start += 100;
    }

    return categories;
}

function renderCategories(categories) {
    const names = {
        "42KM": "Maraton",
        "21KM": "Półmaraton",
        "10KM": "10 km",
        "SM10KM": "Mundurowy",
        "NW5KM": "Nordic Walking"
    };

    let html = "";
    for (let key in names) {
        html += `${names[key]}: ${categories[key] || 0}<br>`;
    }

    document.getElementById("categories").innerHTML = html;
}

async function getBoleslawiec() {
    const urls = [
        "https://b4sportonline.pl/boleslawiec_run/lista_uczestnikow_polmaraton_1/11893",
        "https://b4sportonline.pl/boleslawiec_run/lista_uczestnikow_europejski_bieg_na_zdrowie__10km/11894",
        "https://b4sportonline.pl/boleslawiec_run/lista_uczestnikow_europejski_bieg_na_zdrowie__5km/11895"
    ];

    let total = 0;

    for (let url of urls) {
        try {
            const html = await fetchHTML(url);
            const doc = new DOMParser().parseFromString(html, "text/html");
            total += Math.max(0, doc.querySelectorAll("table tr").length - 1);
        } catch {}
    }

    return total;
}

async function loadData() {
    try {
        const [eventHTML, mainHTML, kidsHTML, categories, bol] = await Promise.all([
            fetchHTML(EVENT_URL),
            fetchHTML(MAIN_URL),
            fetchHTML(KIDS_URL),
            getCategories(),
            getBoleslawiec()
        ]);

        const eventDoc = new DOMParser().parseFromString(eventHTML, "text/html");
        const mainDoc = new DOMParser().parseFromString(mainHTML, "text/html");
        const kidsDoc = new DOMParser().parseFromString(kidsHTML, "text/html");

        const paid = getPaid(eventDoc);
        const total = getTotal(mainDoc);
        const kids = getKids(kidsDoc);
        const unpaid = total - paid;

        document.getElementById("total").innerText = total;
        document.getElementById("paid").innerText = paid;
        document.getElementById("unpaid").innerText = unpaid;
        document.getElementById("kids").innerText = kids;

        renderCategories(categories);

        document.getElementById("bol").innerText = bol;

    } catch (e) {
        console.error("Błąd:", e);
    }
}

loadData();
updateCountdown();

setInterval(loadData, 60000);
setInterval(updateCountdown, 60000);
</script>

</body>
</html>
